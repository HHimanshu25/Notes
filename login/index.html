<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="auth-container">

    <!-- LOGIN -->
    <section class="auth auth-login">    
        <header class="auth-title">Ready to get productive? Login</header>

        <div class="auth-form">

            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="Email address">
            <span class="error-email">Invalid email address</span>

            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Password">

            <button class="btn-forgot">Forgot Password?</button>
        </div>

        <div class="auth-footer">
            <button class="btn-login" onclick="login()">Login</button>
            <div class="auth-switch">
                Don't have an account? 
                <span onclick="toggleScroll()">Sign Up</span>
            </div>
        </div>
    </section>


    <!-- SIGNUP -->
    <section class="auth auth-signup">

        <header class="auth-title">Begin your notes taking adventure with us! Sign Up</header>

        <div class="auth-form">

            <label for="signup-name">Name</label>
            <input type="text" id="signup-name" placeholder="Name">

            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" placeholder="Email address">

            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="Password">

            <div class="password-strength">
                Strength: <span>--</span>
            </div>
        </div>

        <div class="auth-footer">
            <button class="btn-signup">Sign Up</button>
            <div class="auth-switch">
                Already have an account? 
                <span onclick="toggleScroll()">Login</span>
            </div>
        </div>

    </section>

</div>
<script src="login.js"></script>
</body>
</html>
